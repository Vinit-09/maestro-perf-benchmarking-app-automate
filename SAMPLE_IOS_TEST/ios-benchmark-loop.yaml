appId: com.browserstack.Sample-iOS
tags:
  - benchmark
  - real-user-sim
---
# Real-user simulation for the iOS Maestro benchmark.
# Each loop iter mirrors a user opening the app, observing the screen,
# scrolling / swiping in all four directions to navigate, then quitting and
# relaunching the app. No app-specific element IDs are referenced, so the
# flow runs to completion regardless of the BrowserStack-SampleApp's UI.
#
# Target: ~733 s execution duration (PDF spec P90 for Maestro iOS).
# Calibrated 2026-05-04 on iPhone 17 / iOS 26.4 cloud device: 50 iters
# completed in 584 s ⇒ 11.7 s/iter. 63 iters * 11.7 ≈ 737 s.
- launchApp
- repeat:
    times: 63
    commands:
      - takeScreenshot: iter
      - swipe:
          direction: UP
      - swipe:
          direction: DOWN
      - swipe:
          direction: LEFT
      - swipe:
          direction: RIGHT
      - launchApp:
          stopApp: true
