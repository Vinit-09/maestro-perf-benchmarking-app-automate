appId: org.wikipedia.alpha
tags:
  - benchmark
---
# Sized to ~1198 s execution_ms (Maestro Android P90 target from
# PROD-Framework Performance Benchmarking spec) on the OnePlus 9R / Android 14.
# Pre-loop overhead ~9.2 s (launchApp + first tap on search_container).
# Per-loop body steady-state ~14 s on this device (the 5-iter calibration
# under-estimated at 9.5 s; the longer validation showed loops slow down to
# ~14 s as the keyboard / view hierarchy gets exercised).
# 85 iters * 14 + 9.2 ≈ 1199 s.
- launchApp
- tapOn:
    id: "org.wikipedia.alpha:id/search_container"
- repeat:
    times: 85
    commands:
      - eraseText
      - inputText: "BrowserStack"
      - assertVisible: "Software company based in India"
