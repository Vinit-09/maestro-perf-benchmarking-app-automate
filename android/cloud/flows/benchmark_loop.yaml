appId: org.wikipedia.alpha
tags:
  - benchmark
---
# Sized to ~1198 s execution_ms (Maestro Android P90 target from
# PROD-Framework Performance Benchmarking spec) on the OnePlus 9R / Android 14.
# Recalibrated on 2026-05-06 against a hardened device (Play Protect off,
# DND on, stay-awake on): per-rep steady-state ~10.25 s with pre-loop
# overhead ~7 s. 117 reps * 10.25 + 7 ≈ 1206 s, leaving slight headroom
# over the 1198 s P90 mark.
- launchApp
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    id: "org.wikipedia.alpha:id/search_container"
- repeat:
    times: 117
    commands:
      - eraseText
      - inputText: "BrowserStack"
      - assertVisible: "Software company based in India"
